name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-base:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@ac083cc84672d01c60d5e8561d0a939b697de542 # v1.7.0

      - uses: useblacksmith/build-push-action@cbd1f60d194a98cb3be5523b15134501eaf0fbf3 # v2.1.0
        with:
          context: base
          push: false
          tags: sbx-templates:base
          outputs: type=docker,dest=/tmp/base-image.tar

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: base-image
          path: /tmp/base-image.tar
          retention-days: 1

  build-languages:
    needs: build-base
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        image: [bun, rust, golang, python]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@ac083cc84672d01c60d5e8561d0a939b697de542 # v1.7.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: base-image
          path: /tmp

      - name: Load base image
        run: docker load -i /tmp/base-image.tar

      - uses: useblacksmith/build-push-action@cbd1f60d194a98cb3be5523b15134501eaf0fbf3 # v2.1.0
        with:
          context: ${{ matrix.image }}
          push: false
          build-args: |
            BASE_IMAGE=sbx-templates:base

  ci:
    if: always()
    needs: [build-base, build-languages]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - run: |
          if [[ "${{ needs.build-base.result }}" != "success" || "${{ needs.build-languages.result }}" != "success" ]]; then
            exit 1
          fi
